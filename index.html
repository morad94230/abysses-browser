<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abysses — Moteur de recherche décentralisé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Particules flottantes (plancton) */
        .plankton {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00d4ff;
            border-radius: 50%;
            opacity: 0.4;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Conteneur principal */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }

        /* Le requin SVG */
        .shark-container {
            position: relative;
            width: 280px;
            height: 140px;
            animation: swim 6s ease-in-out infinite;
        }

        @keyframes swim {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(20px) translateY(-12px); }
            50% { transform: translateX(0) translateY(-20px); }
            75% { transform: translateX(-20px) translateY(-8px); }
        }

        .shark-container svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.4));
        }

        /* Titre */
        .title {
            font-size: 4em;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #00d4ff 0%, #003366 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.5));
        }

        .subtitle {
            font-size: 1em;
            letter-spacing: 6px;
            color: #ff0044;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Barre de recherche */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 25px;
            background: rgba(10, 10, 30, 0.9);
            border: 2px solid #1a1a4e;
            border-radius: 50px;
            color: #e0e0ff;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .search-input::placeholder {
            color: #334466;
        }

        .search-button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #00d4ff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .search-button:hover {
            background: #ff0044;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.5);
        }

        .search-button svg {
            width: 20px;
            height: 20px;
            fill: #0a0a1a;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 40px;
            font-size: 0.9em;
            color: #445566;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
            color: #00d4ff;
            font-family: monospace;
        }

        .stat-label {
            font-size: 0.8em;
            letter-spacing: 2px;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.75em;
            color: #334466;
            letter-spacing: 2px;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
        }

        .footer a:hover {
            color: #ff0044;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title { font-size: 2.4em; }
            .shark-container { width: 200px; height: 100px; }
            .stats { gap: 20px; }
            .search-input { padding: 15px 50px 15px 18px; font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <!-- Particules de plancton -->
    <script>
        for (let i = 0; i < 50; i++) {
            const plank = document.createElement('div');
            plank.className = 'plankton';
            plank.style.left = Math.random() * 100 + '%';
            plank.style.animationDuration = (Math.random() * 10 + 8) + 's';
            plank.style.animationDelay = (Math.random() * 10) + 's';
            plank.style.width = (Math.random() * 4 + 2) + 'px';
            plank.style.height = plank.style.width;
            plank.style.opacity = Math.random() * 0.5 + 0.1;
            document.body.appendChild(plank);
        }
    </script>

    <div class="main-container">

        <!-- Requin des abysses en SVG -->
        <div class="shark-container">
            <svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
                <!-- Corps -->
                <ellipse cx="140" cy="75" rx="90" ry="28" fill="#0d1b3e" stroke="#00d4ff" stroke-width="2"/>
                <!-- Tête -->
                <ellipse cx="225" cy="72" rx="35" ry="22" fill="#0d1b3e" stroke="#00d4ff" stroke-width="2"/>
                <!-- Aileron dorsal -->
                <polygon points="140,48 150,20 160,48" fill="#0d1b3e" stroke="#00d4ff" stroke-width="2"/>
                <!-- Queue -->
                <polygon points="50,75 10,50 30,75 10,100 50,75" fill="#0d1b3e" stroke="#00d4ff" stroke-width="2"/>
                <!-- Nageoire pectorale -->
                <polygon points="180,95 170,120 160,95" fill="#0d1b3e" stroke="#00d4ff" stroke-width="1.5"/>
                <!-- Œil -->
                <circle cx="245" cy="68" r="5" fill="#ff0044"/>
                <circle cx="246" cy="67" r="2" fill="#fff"/>
                <!-- Branchies -->
                <line x1="210" y1="65" x2="205" y2="85" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
                <line x1="200" y1="63" x2="195" y2="83" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
                <line x1="190" y1="62" x2="185" y2="82" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
                <!-- Dents -->
                <line x1="255" y1="72" x2="250" y2="78" stroke="#00d4ff" stroke-width="1"/>
                <line x1="257" y1="74" x2="252" y2="80" stroke="#00d4ff" stroke-width="1"/>
                <line x1="255" y1="76" x2="250" y2="82" stroke="#00d4ff" stroke-width="1"/>
            </svg>
        </div>

        <!-- Titre -->
        <h1 class="title">ABYSSES</h1>
        <p class="subtitle">Moteur de recherche décentralisé</p>

        <!-- Barre de recherche -->
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Explorez les abysses..." id="searchInput" onkeydown="if(event.key==='Enter') search()">
            <button class="search-button" onclick="search()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">SITES INDEXÉS</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">NŒUDS ACTIFS</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">LIBERTÉ</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span>Propulsé par <a href="https://github.com/morad94230/abysses-browser">Abysses</a> — You are the network. You are the ocean.</span>
    </div>

    <script>
        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                // Pour l'instant, redirige vers une recherche simulée
                document.getElementById('searchInput').value = '';
                document.getElementById('searchInput').placeholder = 'Recherche en cours dans les abysses...';
                setTimeout(() => {
                    document.getElementById('searchInput').placeholder = 'Explorez les abysses...';
                    alert('🔍 Recherche Abysses : "' + query + '"\n\nLe moteur de recherche décentralisé explorera bientôt le réseau .abyss.');
                }, 1500);
            }
        }

        // Animation des stats (simulation)
        setInterval(() => {
            const siteCount = document.querySelectorAll('.stat-number')[0];
            const nodeCount = document.querySelectorAll('.stat-number')[1];
            if (siteCount && Math.random() > 0.7) {
                siteCount.textContent = Math.floor(Math.random() * 50 + 10);
            }
            if (nodeCount && Math.random() > 0.7) {
                nodeCount.textContent = Math.floor(Math.random() * 30 + 5);
            }
        }, 5000);
    </script>
</body>
</html>
